name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 26
            - uses: browser-actions/setup-firefox@v1
            - run: npm install
            - run: npm run zip:clean
            - run: npm run test:headless
