name: Release Beta

on:
    workflow_dispatch:

jobs:
    run:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 0
            - name: Setup Node.js Environment
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
            - name: Install Dependencies And Prepare Version
              id: version
              run: |
                  npm ci --silent
                  BASE_VERSION=$(node -p "require('./package.json').version")
                  LATEST_BETA=$(git tag -l "v${BASE_VERSION}-beta.*" | sort -V | tail -n 1)
                  if [ -z "$LATEST_BETA" ]; then
                      ITERATION=1
                  else
                      ITERATION=${LATEST_BETA##*.}
                      ITERATION=$((ITERATION + 1))
                  fi
                  AMO_VERSION="${BASE_VERSION}.${ITERATION}"
                  echo "beta_version=$AMO_VERSION" >> "$GITHUB_OUTPUT"
                  echo "beta_tag=v${BASE_VERSION}-beta.${ITERATION}" >> "$GITHUB_OUTPUT"
            - name: Build And Upload To AMO (Beta)
              env:
                  FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
                  FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
              run: |
                  node --run zip:beta
                  jq --arg ver "${{ steps.version.outputs.beta_version }}" \
                      '.version = $ver' .output/atbc/manifest.json > tmp.json \
                      && mv tmp.json .output/atbc/manifest.json
                  npx web-ext sign \
                      --api-key $FIREFOX_JWT_ISSUER \
                      --api-secret $FIREFOX_JWT_SECRET \
                      --channel unlisted \
                      --source-dir .output/atbc \
                      --artifacts-dir .output \
                      --approval-timeout 200000 \
                      || echo "Signing timed out. Proceeding without XPI."
            - name: Tag And Create GitHub Pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git tag ${{ steps.version.outputs.beta_tag }}
                  git push origin ${{ steps.version.outputs.beta_tag }}
                  XPI_ASSET=$(find .output -name "*.xpi" 2>/dev/null | head -n 1 || true)
                  ASSET_ARGS=()
                  if [ -n "$XPI_ASSET" ]; then
                      RENAMED_ASSET=".output/atbc-${{ steps.version.outputs.beta_version }}.xpi"
                      mv "$XPI_ASSET" "$RENAMED_ASSET"
                      ASSET_ARGS+=("$RENAMED_ASSET")
                  fi
                  gh release create "${{ steps.version.outputs.beta_tag }}" \
                      "${ASSET_ARGS[@]}" \
                      --title "${{ steps.version.outputs.beta_tag }}" \
                      --prerelease
